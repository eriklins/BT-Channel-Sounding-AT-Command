# Available runners configured by board.cmake.
runners:
- nrfutil
- jlink

# Default flash runner if --runner is not given.
flash-runner: nrfutil

# Default debug runner if --runner is not given.
debug-runner: jlink

# Common runner configuration values.
config:
  board_dir: /opt/nordic/ncs/v3.2.4/zephyr/boards/ezurio/bl54l15u_dvk
  # Build outputs:
  elf_file: zephyr.elf
  hex_file: /Users/erik/Ezurio/tmp/cs_at_command/build_bl54l15u_dvk_dual-antenna/merged.hex
  bin_file: zephyr.bin
  # Host tools:
  gdb: /Users/erik/develop/zephyrsdk/zephyr-sdk-0.17.4/arm-zephyr-eabi/bin/arm-zephyr-eabi-gdb

# Runner specific arguments
args:
  nrfutil:
    []

  jlink:
    - --dt-flash=y
    - --device=nRF54L15_M33
    - --speed=4000
